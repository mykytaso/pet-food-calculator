<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--  <link href="./output.css" rel="stylesheet">-->



  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <title>Pet Food Calculator</title>

</head>

<body style="background-color: rgb(199, 214, 222);">
  <div class="container">

    <div class="row justify-center m-5">
      <div class="col-auto">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="toggle-cost">
          <label class="form-check-label" for="toggle-cost">Calculate price as well</label>
        </div>
      </div>

      <div class="col-auto">
        <button id="add-row" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-4 rounded">
          Add Food
        </button>

      </div>
    </div>

    
    
    <div class="row justify-center" id="food-rows"></div>



    <div class="row justify-center">
      <div class="col-auto">
        Results:
    
        <div>
          <strong>Total kcal: <span id="total-kcal">0</span></strong>
        </div>
    
        <div>
          <strong>Total cost: <span id="total-cost">0</span></strong>
        </div>

      </div>
    </div>
  



    <template id="food-row-template">

      <div class="col">

      <div class="row food-row" style="background-color: white; width: 380px; border-radius: 30px; padding: 20px; margin: 20px; padding-bottom: 40px; gap: 10px;">


      <div class="col">
        <div class="row" style="justify-content: end; margin-bottom: 20px;">
          <div class="col-auto">
            <button class="col delete-row">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>

        <div class="row" style="align-items: center; margin-top: 14px;">
          <div class="col-auto border">
            Food kcal/kg
          </div>
          <div class="col border ps-0">
            <div class="input-group input-group-sm">
              <input type="number" class="form-control kcalPerKg" aria-label="Kcal/kg of the food" style="width: 100px;">
              <span class="input-group-text" id="inputGroup-sizing-sm" style="width: 66px; color: rgb(140, 148, 154);">Kcal/kg</span>
            </div>
          </div>
        </div>
        
        <div class="row" style="align-items: center; margin-top: 14px;">
          <div class="col">
            Meals per day
          </div>
          <div class="col">
            <div class="input-group input-group-sm">
              <input type="number" class="form-control mealsNumber" aria-label="Meals per day">
              <span class="input-group-text" id="inputGroup-sizing-sm" style="width: 66px;">Meals</span>
            </div>
          </div>
        </div>

        <div class="row" style="align-items: center; margin-top: 14px;">
          <div class="col">
            Meal size
          </div>
          <div class="col">
            <div class="input-group input-group-sm">
              <input type="number" class="form-control portionSize" aria-label="Meal size">
              <span class="input-group-text" id="inputGroup-sizing-sm" style="width: 66px;">Grams</span>
            </div>
          </div>
        </div>

        <div class="row" style="align-items: center;">
          <div class="col cost-field" style="margin-top: 14px;">
            Package size
          </div>
          <div class="col cost-field" style="margin-top: 14px;">
            <div class="input-group input-group-sm">
              <input type="number" class="form-control packageSize" aria-label="Package size">
              <span class="input-group-text" id="inputGroup-sizing-sm" style="width: 66px;">Grams</span>
            </div>
          </div>
        </div>

        <div class="row" style="align-items: center;">
          <div class="col cost-field" style="margin-top: 14px;">
            Package price
          </div>
          <div class="col cost-field" style="margin-top: 14px;">
            <div class="input-group input-group-sm">
              <input type="number" class="form-control price" aria-label="Package size">
              <span class="input-group-text" id="inputGroup-sizing-sm" style="width: 66px; justify-content: center;">$</span>
            </div>
          </div>
        </div>
          

  

        <div class="row justify-content-between" style="margin-top: 30px;">
          <div class="col-auto">
            <div>
              <span style="font-weight: 800;">Kcal per day: </span>
              <span class="kcal-output">0</span>
            </div>
          
            <div class="cost-field">
              <span style="font-weight: 800;">Cost per day: </span>
              <span class="cost-output"></span>
            </div>
          </div>
        </div>
            

      </div>





      </div>
      </div>
    </template>
    





  <script src="/static/js/script.js"></script>





  </div>
</body>
</html>
