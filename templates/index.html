<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

  <link rel="stylesheet" href="/static/css/style.css">
  <title>Pet Food Calculator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">

</head>


<body style="background-color: rgb(199, 214, 222);">
  <div class="container-fluid">

    <div class="row border justify-content-center align-items-center mt-5">
      <div class="col-auto">
        <div class="form-check form-switch">
          <input class="form-check-input" type="checkbox" role="switch" id="toggle-cost">
          <label class="form-check-label" for="toggle-cost">Calculate price as well</label>
        </div>
      </div>

      <div class="col-auto">
        <button class="btn btn-primary" id="add-row">
          Add Food
        </button>
      </div>
    </div>

    <!-- This row is used to display the food rows dynamically -->
    <div class="row border justify-content-center" id="food-rows"></div>

    <!-- Results -->
    <div class="row border">
      <div class="col-auto">
        Results:
    
        <div>
          <strong>Total kcal: <span id="total-kcal">0</span></strong>
        </div>
    
        <div>
          <strong>Total cost: <span id="total-cost">0</span></strong>
        </div>

      </div>
    </div>


    <!-- Template for a single food row -->
    <template id="food-row-template">
        <div class="col-auto m-3 p-4 bg-white rounded-5 food-row">


          <div class="d-flex justify-content-end">
            <a href="#" class="text-decoration-none delete-row text-secondary align-self-end mb-3">
              <i class="bi bi-x-lg"></i>
            </a>
          </div>


          <div class="d-flex align-items-center gap-2">
            <label class="text-nowrap mb-0 field-text" style="width: 120px;">Food kcal/kg</label>
            <input class="form-control form-control-sm rounded-4 kcalPerKg" placeholder="kcal/kg" aria-label="Kcal per kg" style="width: 80px;" />
          </div>


          <div class="d-flex align-items-center gap-2 mt-2">
            <label class="text-nowrap mb-0" style="width: 120px;">Meals per day</label>
            <input class="form-control form-control-sm rounded-4 mealsNumber" placeholder="meals" aria-label="Meals per day" style="width: 80px;" />
          </div>


          <div class="d-flex align-items-center gap-2 mt-2">
            <label class="text-nowrap mb-0" style="width: 120px;">Meal size</label>
            <input class="form-control form-control-sm rounded-4 portionSize" placeholder="grams" aria-label="Meal size" style="width: 80px;" />
          </div>


          <div class="d-flex align-items-center gap-2 mt-2 cost-field">
            <label class="text-nowrap mb-0" style="width: 120px;">Package size</label>
            <input class="form-control form-control-sm rounded-4 packageSize" placeholder="grams" aria-label="Package size" style="width: 80px;" />
          </div>


          <div class="d-flex align-items-center gap-2 mt-2 cost-field">
            <label class="text-nowrap mb-0" style="width: 120px;">Package price</label>
            <input class="form-control form-control-sm rounded-4 price" placeholder="$" aria-label="Package price" style="width: 80px;" />
          </div>



          <div class="row mt-4">
            <div class="col-auto border">
              <div>
                <strong>Kcal per day:</strong> <span class="kcal-output">0</span>
              </div>
              <div class="cost-field">
                <strong>Cost per day:</strong> <span class="cost-output"></span>
              </div>
            </div>
          </div>

        </div>
    </template>


    <script src="/static/js/script.js"></script>

  </div>
</body>
</html>
